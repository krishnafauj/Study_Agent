<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Document Manager</title>
  <meta name="description" content="Upload, organize, and search PDF documents with MongoDB Vector Search" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app" id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
              <path d="M8 7h8M8 11h6" />
            </svg>
          </div>
          <span class="logo-text">RAG Docs</span>
        </div>
      </div>

      <div class="create-folder-section">
        <div class="create-folder-input-group">
          <input
            type="text"
            id="newFolderInput"
            class="create-folder-input"
            placeholder="New folder name..."
            maxlength="50"
          />
          <button id="createFolderBtn" class="create-folder-btn" title="Create folder">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" />
            </svg>
          </button>
        </div>
      </div>

      <div class="folder-list-header">
        <span>Folders</span>
        <span class="folder-count" id="folderCount">0</span>
      </div>

      <div class="folder-list" id="folderList">
        <!-- Folders rendered here -->
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">
          <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
          </svg>
        </div>
        <h2>Select a folder</h2>
        <p>Choose a folder from the sidebar or create a new one to get started</p>
      </div>

      <!-- Folder view -->
      <div class="folder-view" id="folderView" style="display:none;">
        <div class="folder-view-header">
          <div class="folder-view-info">
            <h1 id="currentFolderName">Folder Name</h1>
            <span class="doc-count" id="docCount">0 documents</span>
          </div>
          <div class="folder-view-actions">
            <label class="upload-btn" id="uploadBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="17 8 12 3 7 8" />
                <line x1="12" y1="3" x2="12" y2="15" />
              </svg>
              Upload PDF
              <input type="file" id="fileInput" accept=".pdf" style="display:none" />
            </label>
            <button class="delete-folder-btn" id="deleteFolderBtn" title="Delete folder">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6" />
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Upload progress -->
        <div class="upload-progress" id="uploadProgress" style="display:none;">
          <div class="upload-progress-bar">
            <div class="upload-progress-fill" id="uploadProgressFill"></div>
          </div>
          <span class="upload-progress-text" id="uploadProgressText">Uploading...</span>
        </div>

        <!-- Document grid -->
        <div class="document-grid" id="documentGrid">
          <!-- Documents rendered here -->
        </div>

        <!-- Empty docs -->
        <div class="empty-docs" id="emptyDocs" style="display:none;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
          </svg>
          <p>No documents yet. Upload a PDF to get started!</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
</body>
</html>
